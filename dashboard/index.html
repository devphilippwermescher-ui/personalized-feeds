<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myFeedPilot - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; background: #f8f9fb; color: #1a1a2e; font-family: Inter, sans-serif; }
      #root { min-height: 100vh; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;color:#6b7280;">
        <div style="width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#615DEC;border-radius:50%;animation:spin .7s linear infinite;"></div>
        <p style="margin:0;">Loading...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
