name: Build and Release Extension

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-release.yml'
      - 'extension/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'extension/package.json'
      - 'extension/package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-release.yml'
      - 'extension/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'extension/package.json'
      - 'extension/package-lock.json'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release (delete existing tag if exists and re-release)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
      delete_existing_tag: ${{ steps.check_tag.outputs.delete_existing_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./extension/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Sync manifest version from package.json
        run: |
          cd extension
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./src/manifest.json').version")
          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Syncing manifest.json version ($MANIFEST_VERSION -> $PKG_VERSION) from package.json"
            npm run version:sync
          else
            echo "package.json and manifest.json versions match ($PKG_VERSION)"
          fi

      - name: Check if tag exists and if release is needed
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          FORCE="${{ github.event.inputs.force_release == 'true' }}"

          if [ "$FORCE" = "true" ]; then
            echo "Force release requested"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "delete_existing_tag=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists - skip release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "delete_existing_tag=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist - will create release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "delete_existing_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            extension/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install extension dependencies
        run: cd extension && npm ci

      - name: Type check extension
        run: cd extension && npm run type-check

      - name: Test extension
        run: cd extension && npm test

      - name: Build extension
        run: cd extension && npm run build

      - name: Create ZIP archive
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          cd extension/dist
          zip -r "../../personalized-feeds-v${VERSION}.zip" .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: personalized-feeds-extension
          path: personalized-feeds-v${{ steps.get_version.outputs.version }}.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: >
      needs.build.outputs.should_release == 'true' &&
      (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete existing release and tag (if re-release)
        if: needs.build.outputs.delete_existing_tag == 'true'
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          git push origin --delete "v$VERSION" 2>/dev/null || true
          git tag -d "v$VERSION" 2>/dev/null || true

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: personalized-feeds-extension

      - name: Create Git Tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "v$VERSION" 2>/dev/null || true
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          files: personalized-feeds-v${{ needs.build.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
